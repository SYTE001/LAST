<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0d0d">
<title>Novaa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="logo">novaa</div>
  <div class="search-pill" id="searchPill">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="searchInput" placeholder="Ketik kode..." inputmode="text" autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="clear-btn" id="clearBtn" style="display:none" aria-label="Hapus">✕</button>
  </div>
</header>

<!-- HOME VIEW -->
<div id="homeView">
  <div class="home-icon">🛍️</div>
  <div class="home-title">Selamat datang di Novaa!</div>
  <div class="home-sub">Masukkan <b>kode folder</b> dari video TikTok untuk melihat produknya.</div>
</div>

<!-- LOADING / NOT FOUND / RESULT HEADER -->
<div id="stateView" style="display:none">
  <!-- Folder header (shown when results found) -->
  <div class="folder-header" id="folderHeader" style="display:none">
    <div class="fh-inner">
      <span class="fh-emoji" id="fhEmoji">📁</span>
      <div>
        <div class="fh-code">Kode <span id="fhCode"></span></div>
        <div class="fh-name" id="fhName"></div>
      </div>
    </div>
  </div>

  <!-- Not found state -->
  <div class="state-message" id="notFoundView" style="display:none">
    <div class="big">🙈</div>
    <p>Kode "<b id="notFoundCode"></b>" tidak ditemukan.<br>Cek ulang kode di videonya ya!</p>
  </div>

  <!-- Product count label -->
  <div class="product-count-bar" id="productCountBar" style="display:none">
    <span id="productCountLabel"></span>
  </div>
</div>

<!-- PRODUCT GRID -->
<div id="resultView" style="display:none">
  <div class="grid" id="productGrid"></div>
  <div class="load-spinner" id="spinner" style="display:none"><div class="spinner"></div><span>Memuat produk...</span></div>
  <div class="sentinel" id="sentinel"></div>
</div>

<script src="script.js"></script>
</body>
</html>
